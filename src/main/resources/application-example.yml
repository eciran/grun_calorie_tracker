spring:
  application:
    name: grun-calorie-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/grun_calorie_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      repositories:
        enabled: false

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: GRun Calorie Tracker API
    version: 0.0.1-SNAPSHOT

logging:
  pattern:
    level: "%5p [cid:%X{correlationId:-}]"

jwt:
  secret: ${JWT_SECRET:Q0hBTkdFX01FX0xPQ0FMX0RFVkVMT1BNRU5UX1NFQ1JFVF9LRVlfMTIzNDU2Nzg5MA==}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

openfoodfacts:
  base-url: ${OPENFOODFACTS_BASE_URL:https://world.openfoodfacts.org}

grun:
  errors:
    include-internal-details: ${GRUN_ERRORS_INCLUDE_INTERNAL_DETAILS:false}
  ai:
    enabled: ${GRUN_AI_ENABLED:false}
    provider: ${GRUN_AI_PROVIDER:DISABLED}
    model: ${GRUN_AI_MODEL:not-configured}
    max-history-limit: ${GRUN_AI_MAX_HISTORY_LIMIT:30}
    safety:
      enabled: ${GRUN_AI_SAFETY_ENABLED:true}
      max-item-calories: ${GRUN_AI_SAFETY_MAX_ITEM_CALORIES:3000}
      max-total-calories: ${GRUN_AI_SAFETY_MAX_TOTAL_CALORIES:6000}
    photo:
      max-image-reference-length: ${GRUN_AI_PHOTO_MAX_IMAGE_REFERENCE_LENGTH:2048}
      allowed-reference-prefixes: ${GRUN_AI_PHOTO_ALLOWED_REFERENCE_PREFIXES:s3://,https://}
      max-upload-bytes: ${GRUN_AI_PHOTO_MAX_UPLOAD_BYTES:5242880}
      allowed-content-types: ${GRUN_AI_PHOTO_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
      reference-ttl: ${GRUN_AI_PHOTO_REFERENCE_TTL:30m}
      cleanup-interval-ms: ${GRUN_AI_PHOTO_CLEANUP_INTERVAL_MS:3600000}
      storage-directory: ${GRUN_AI_PHOTO_STORAGE_DIRECTORY:storage/ai-meal-photos}
      public-base-url: ${GRUN_AI_PHOTO_PUBLIC_BASE_URL:https://api.grun.app}
    http-json:
      endpoint: ${GRUN_AI_HTTP_JSON_ENDPOINT:}
      api-key: ${GRUN_AI_HTTP_JSON_API_KEY:}
      timeout: ${GRUN_AI_HTTP_JSON_TIMEOUT:30s}
  revenuecat:
    webhook-authorization: ${GRUN_REVENUECAT_WEBHOOK_AUTHORIZATION:}
    strict-product-mapping: ${GRUN_REVENUECAT_STRICT_PRODUCT_MAPPING:true}
    entitlements:
      plus: ${GRUN_REVENUECAT_PLUS_ENTITLEMENTS:plus,plus_access}
      pro: ${GRUN_REVENUECAT_PRO_ENTITLEMENTS:pro,pro_access}
    products:
      plus: ${GRUN_REVENUECAT_PLUS_PRODUCT_IDS:grun_plus_monthly,grun_plus_yearly}
      pro: ${GRUN_REVENUECAT_PRO_PRODUCT_IDS:grun_pro_monthly,grun_pro_yearly}
      default-ai-addon-validity-days: ${GRUN_REVENUECAT_AI_ADDON_DEFAULT_VALIDITY_DAYS:30}
      ai-addon-quotas:
        grun_ai_15_credits: 15
        grun_ai_50_credits: 50
      ai-addon-validity-days:
        grun_ai_15_credits: 30
        grun_ai_50_credits: 30
  mail:
    provider: ${GRUN_MAIL_PROVIDER:LOG}
    from-email: ${GRUN_MAIL_FROM_EMAIL:no-reply@grun.local}
    from-name: ${GRUN_MAIL_FROM_NAME:GRun}
    brevo:
      api-key: ${GRUN_BREVO_API_KEY:}
      api-url: ${GRUN_BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
  refresh-token:
    expiration-days: ${GRUN_REFRESH_TOKEN_EXPIRATION_DAYS:30}
  rate-limit:
    enabled: ${GRUN_RATE_LIMIT_ENABLED:true}
    redis:
      enabled: ${GRUN_RATE_LIMIT_REDIS_ENABLED:false}
    auth:
      max-requests-per-minute: ${GRUN_RATE_LIMIT_AUTH_MAX_REQUESTS_PER_MINUTE:20}
    password-reset:
      max-requests-per-minute: ${GRUN_RATE_LIMIT_PASSWORD_RESET_MAX_REQUESTS_PER_MINUTE:5}
    email-verification-resend:
      max-requests-per-minute: ${GRUN_RATE_LIMIT_EMAIL_VERIFICATION_RESEND_MAX_REQUESTS_PER_MINUTE:5}
    ai-draft:
      max-requests-per-minute: ${GRUN_RATE_LIMIT_AI_DRAFT_MAX_REQUESTS_PER_MINUTE:10}
  oauth:
    google:
      client-ids: ${GOOGLE_OAUTH_CLIENT_IDS:}
    apple:
      client-ids: ${APPLE_OAUTH_CLIENT_IDS:}
  password-reset:
    expiration-minutes: ${GRUN_PASSWORD_RESET_EXPIRATION_MINUTES:30}
    base-url: ${GRUN_PASSWORD_RESET_BASE_URL:http://localhost:8080/reset-password}
    request-cooldown-seconds: ${GRUN_PASSWORD_RESET_REQUEST_COOLDOWN_SECONDS:60}
  email-verification:
    expiration-minutes: ${GRUN_EMAIL_VERIFICATION_EXPIRATION_MINUTES:1440}
    base-url: ${GRUN_EMAIL_VERIFICATION_BASE_URL:http://localhost:8080/verify-email}
    resend-cooldown-level-1-seconds: ${GRUN_EMAIL_VERIFICATION_RESEND_COOLDOWN_LEVEL_1_SECONDS:30}
    resend-cooldown-level-2-seconds: ${GRUN_EMAIL_VERIFICATION_RESEND_COOLDOWN_LEVEL_2_SECONDS:120}
    resend-cooldown-level-3-seconds: ${GRUN_EMAIL_VERIFICATION_RESEND_COOLDOWN_LEVEL_3_SECONDS:300}
  water:
    default-daily-target-ml: ${GRUN_WATER_DEFAULT_DAILY_TARGET_ML:2500}
    reminders:
      enabled: ${GRUN_WATER_REMINDER_ENABLED:true}
      scan-interval-ms: ${GRUN_WATER_REMINDER_SCAN_INTERVAL_MS:300000}
  local:
    admin:
      bootstrap-enabled: ${GRUN_LOCAL_ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${GRUN_LOCAL_ADMIN_EMAIL:}
      password: ${GRUN_LOCAL_ADMIN_PASSWORD:}
    demo-seed:
      enabled: ${GRUN_LOCAL_DEMO_SEED_ENABLED:false}
      user-email: ${GRUN_LOCAL_DEMO_USER_EMAIL:}
      user-password: ${GRUN_LOCAL_DEMO_USER_PASSWORD:}
