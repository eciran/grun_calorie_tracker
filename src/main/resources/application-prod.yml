spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    baseline-on-migrate: false

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    com.grun.calorietracker: INFO

grun:
  errors:
    include-internal-details: false
  ai:
    enabled: ${GRUN_AI_ENABLED:false}
    provider: ${GRUN_AI_PROVIDER:DISABLED}
    model: ${GRUN_AI_MODEL:not-configured}
    max-history-limit: ${GRUN_AI_MAX_HISTORY_LIMIT:30}
    safety:
      enabled: ${GRUN_AI_SAFETY_ENABLED:true}
      max-item-calories: ${GRUN_AI_SAFETY_MAX_ITEM_CALORIES:3000}
      max-total-calories: ${GRUN_AI_SAFETY_MAX_TOTAL_CALORIES:6000}
    photo:
      max-image-reference-length: ${GRUN_AI_PHOTO_MAX_IMAGE_REFERENCE_LENGTH:2048}
      allowed-reference-prefixes: ${GRUN_AI_PHOTO_ALLOWED_REFERENCE_PREFIXES:s3://,https://}
      max-upload-bytes: ${GRUN_AI_PHOTO_MAX_UPLOAD_BYTES:5242880}
      allowed-content-types: ${GRUN_AI_PHOTO_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
      reference-ttl: ${GRUN_AI_PHOTO_REFERENCE_TTL:30m}
      cleanup-interval-ms: ${GRUN_AI_PHOTO_CLEANUP_INTERVAL_MS:3600000}
      storage-directory: ${GRUN_AI_PHOTO_STORAGE_DIRECTORY:storage/ai-meal-photos}
      public-base-url: ${GRUN_AI_PHOTO_PUBLIC_BASE_URL:https://api.grun.app}
    http-json:
      endpoint: ${GRUN_AI_HTTP_JSON_ENDPOINT:}
      api-key: ${GRUN_AI_HTTP_JSON_API_KEY:}
      timeout: ${GRUN_AI_HTTP_JSON_TIMEOUT:30s}
    recipe-image-moderation:
      enabled: ${GRUN_AI_RECIPE_IMAGE_MODERATION_ENABLED:false}
      endpoint: ${GRUN_AI_RECIPE_IMAGE_MODERATION_ENDPOINT:}
      api-key: ${GRUN_AI_RECIPE_IMAGE_MODERATION_API_KEY:}
      timeout: ${GRUN_AI_RECIPE_IMAGE_MODERATION_TIMEOUT:15s}
      reject-threshold: ${GRUN_AI_RECIPE_IMAGE_MODERATION_REJECT_THRESHOLD:0.85}
      approve-threshold: ${GRUN_AI_RECIPE_IMAGE_MODERATION_APPROVE_THRESHOLD:0.95}
  mail:
    provider: ${GRUN_MAIL_PROVIDER:BREVO}
  rate-limit:
    enabled: true
    redis:
      enabled: true
  revenuecat:
    strict-product-mapping: true
    api:
      enabled: ${GRUN_REVENUECAT_API_ENABLED:false}
      base-url: ${GRUN_REVENUECAT_API_BASE_URL:https://api.revenuecat.com/v2}
      secret-key: ${GRUN_REVENUECAT_API_SECRET_KEY:}
      project-id: ${GRUN_REVENUECAT_PROJECT_ID:}
      currency: ${GRUN_REVENUECAT_CURRENCY:EUR}
  local:
    admin:
      bootstrap-enabled: false
    demo-seed:
      enabled: false
