spring:
  datasource:
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:0}
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
    cache-names: foodProductById,foodProductByBarcode,foodProductSearch
    redis:
      time-to-live: ${SPRING_CACHE_REDIS_TIME_TO_LIVE:10m}
      cache-null-values: false
      use-key-prefix: true
      key-prefix: grun:prod:
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 25
  flyway:
    baseline-on-migrate: false
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:6MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:7MB}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    com.grun.calorietracker: INFO

grun:
  errors:
    include-internal-details: false
  recipe-media:
    image:
      max-upload-bytes: ${GRUN_RECIPE_IMAGE_MAX_UPLOAD_BYTES:4194304}
      allowed-content-types: ${GRUN_RECIPE_IMAGE_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
      storage-directory: ${GRUN_RECIPE_IMAGE_STORAGE_DIRECTORY:storage/recipe-images}
      public-base-url: ${GRUN_RECIPE_IMAGE_PUBLIC_BASE_URL:https://api.grun.app}
  profile-media:
    avatar:
      max-upload-bytes: ${GRUN_PROFILE_AVATAR_MAX_UPLOAD_BYTES:2097152}
      allowed-content-types: ${GRUN_PROFILE_AVATAR_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
      storage-directory: ${GRUN_PROFILE_AVATAR_STORAGE_DIRECTORY:storage/profile-avatars}
      public-base-url: ${GRUN_PROFILE_AVATAR_PUBLIC_BASE_URL:https://api.grun.app}
  security:
    swagger-public: false
    login:
      max-failed-attempts: ${GRUN_SECURITY_LOGIN_MAX_FAILED_ATTEMPTS:5}
      lock-minutes: ${GRUN_SECURITY_LOGIN_LOCK_MINUTES:15}
  http-client:
    connect-timeout: ${GRUN_HTTP_CLIENT_CONNECT_TIMEOUT:3s}
    read-timeout: ${GRUN_HTTP_CLIENT_READ_TIMEOUT:10s}
  ai:
    enabled: ${GRUN_AI_ENABLED:false}
    provider: ${GRUN_AI_PROVIDER:DISABLED}
    model: ${GRUN_AI_MODEL:not-configured}
    max-history-limit: ${GRUN_AI_MAX_HISTORY_LIMIT:30}
    safety:
      enabled: ${GRUN_AI_SAFETY_ENABLED:true}
      max-item-calories: ${GRUN_AI_SAFETY_MAX_ITEM_CALORIES:3000}
      max-total-calories: ${GRUN_AI_SAFETY_MAX_TOTAL_CALORIES:6000}
    photo:
      max-image-reference-length: ${GRUN_AI_PHOTO_MAX_IMAGE_REFERENCE_LENGTH:2048}
      allowed-reference-prefixes: ${GRUN_AI_PHOTO_ALLOWED_REFERENCE_PREFIXES:s3://,https://}
      max-upload-bytes: ${GRUN_AI_PHOTO_MAX_UPLOAD_BYTES:5242880}
      allowed-content-types: ${GRUN_AI_PHOTO_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}
      reference-ttl: ${GRUN_AI_PHOTO_REFERENCE_TTL:30m}
      cleanup-interval-ms: ${GRUN_AI_PHOTO_CLEANUP_INTERVAL_MS:3600000}
      storage-directory: ${GRUN_AI_PHOTO_STORAGE_DIRECTORY:storage/ai-meal-photos}
      public-base-url: ${GRUN_AI_PHOTO_PUBLIC_BASE_URL:https://api.grun.app}
    http-json:
      endpoint: ${GRUN_AI_HTTP_JSON_ENDPOINT:}
      api-key: ${GRUN_AI_HTTP_JSON_API_KEY:}
      timeout: ${GRUN_AI_HTTP_JSON_TIMEOUT:30s}
    recipe-image-moderation:
      enabled: ${GRUN_AI_RECIPE_IMAGE_MODERATION_ENABLED:false}
      endpoint: ${GRUN_AI_RECIPE_IMAGE_MODERATION_ENDPOINT:}
      api-key: ${GRUN_AI_RECIPE_IMAGE_MODERATION_API_KEY:}
      timeout: ${GRUN_AI_RECIPE_IMAGE_MODERATION_TIMEOUT:15s}
      reject-threshold: ${GRUN_AI_RECIPE_IMAGE_MODERATION_REJECT_THRESHOLD:0.85}
      approve-threshold: ${GRUN_AI_RECIPE_IMAGE_MODERATION_APPROVE_THRESHOLD:0.95}
  mail:
    provider: ${GRUN_MAIL_PROVIDER:BREVO}
  tokens:
    cleanup-interval-ms: ${GRUN_TOKENS_CLEANUP_INTERVAL_MS:3600000}
  rate-limit:
    enabled: true
    trusted-proxy-count: ${GRUN_RATE_LIMIT_TRUSTED_PROXY_COUNT:0}
    redis:
      enabled: ${GRUN_RATE_LIMIT_REDIS_ENABLED:false}
  revenuecat:
    strict-product-mapping: true
    api:
      enabled: ${GRUN_REVENUECAT_API_ENABLED:false}
      base-url: ${GRUN_REVENUECAT_API_BASE_URL:https://api.revenuecat.com/v2}
      secret-key: ${GRUN_REVENUECAT_API_SECRET_KEY:}
      project-id: ${GRUN_REVENUECAT_PROJECT_ID:}
      currency: ${GRUN_REVENUECAT_CURRENCY:EUR}
  local:
    admin:
      bootstrap-enabled: false
    demo-seed:
      enabled: false
