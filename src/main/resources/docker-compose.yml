version: '3.1'

services:
  postgres:
    image: postgres:16
    container_name: grun-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - grun_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: grun-redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - grun_redisdata:/data

volumes:
  grun_pgdata:
  grun_redisdata:
