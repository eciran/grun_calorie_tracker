spring:
  datasource:
    url: jdbc:h2:mem:grun_calorie_tracker_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_batch_fetch_size: 25

  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false

jwt:
  secret: R1J1bl9DYWxvcmllX1RyYWNrZXJfU2VjcmV0S2V5XzIwMjVfQmFzZTY0X1NhbXBsZV9LZXlfMTIzNDU2Nzg5
  expiration-ms: 86400000

openfoodfacts:
  base-url: https://world.openfoodfacts.org

grun:
  security:
    login:
      max-failed-attempts: 5
      lock-minutes: 15
